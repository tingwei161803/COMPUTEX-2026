<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ==== Primary meta (filled by app.js from SITE_META) ==== -->
  <title>COMPUTEX 2026 · AI Together</title>
  <meta name="description" content="COMPUTEX 2026 — the world's largest AI exhibition, June 2–5 in Taipei. Explore the three core themes (AI &amp; Computing, Robotics &amp; Mobility, Next-Gen Tech), the show schedule, InnoVEX, NVIDIA GTC Taipei and visitor info. Bilingual 中文 / English." />
  <link rel="canonical" href="https://tingwei161803.github.io/COMPUTEX-2026/" />
  <meta name="theme-color" content="#5B6CFF" />

  <!-- ==== Open Graph ==== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="COMPUTEX 2026 · AI Together" />
  <meta property="og:description" content="The world's largest AI exhibition returns to Taipei, June 2–5, 2026. AI &amp; Computing · Robotics &amp; Mobility · Next-Gen Tech." />
  <meta property="og:url" content="https://tingwei161803.github.io/COMPUTEX-2026/" />
  <meta property="og:image" content="https://tingwei161803.github.io/COMPUTEX-2026/assets/og-image.png" />

  <!-- ==== Twitter ==== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="COMPUTEX 2026 · AI Together" />
  <meta name="twitter:description" content="The world's largest AI exhibition returns to Taipei, June 2–5, 2026. AI &amp; Computing · Robotics &amp; Mobility · Next-Gen Tech." />
  <meta name="twitter:image" content="https://tingwei161803.github.io/COMPUTEX-2026/assets/og-image.png" />

  <!-- ==== JSON-LD structured data (Event) ==== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Event",
    "name": "COMPUTEX 2026",
    "description": "The world's largest AI exhibition — AI Together. AI & Computing, Robotics & Mobility, and Next-Gen Tech.",
    "startDate": "2026-06-02",
    "endDate": "2026-06-05",
    "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
    "eventStatus": "https://schema.org/EventScheduled",
    "url": "https://tingwei161803.github.io/COMPUTEX-2026/",
    "location": {
      "@type": "Place",
      "name": "Taipei Nangang Exhibition Center (TaiNEX 1 & 2), TWTC Hall 1, TICC",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Taipei",
        "addressCountry": "TW"
      }
    },
    "organizer": [
      { "@type": "Organization", "name": "TAITRA" },
      { "@type": "Organization", "name": "TCA" }
    ]
  }
  </script>

  <!-- ==== Fonts + icons (CDN, no local files) ==== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300,0,0&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- ==== App bar ==== -->
  <header class="appbar">
    <div class="appbar__inner">
      <a class="brand" href="#top">
        <span class="material-symbols-rounded brand__logo">hub</span>
        <span class="brand__name" id="brandName">COMPUTEX 2026</span>
      </a>

      <div class="appbar__actions">
        <button class="icon-btn" id="langToggle" type="button"
                title="Language" aria-label="Toggle language / 切換語言">
          <span class="material-symbols-rounded">translate</span>
          <span class="icon-btn__txt" id="langLabel">中</span>
        </button>

        <button class="icon-btn" id="themeToggle" type="button"
                title="Theme" aria-label="Toggle theme / 切換主題">
          <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ==== Cross-page rail (shared across all pages) ==== -->
  <nav class="siterail siterail--flow" id="siteRail" aria-label="Site navigation"></nav>

  <!-- ==== Sticky section nav (auto-generated anchor pills + scrollspy) ==== -->
  <nav class="sectionnav" id="sectionNav" aria-label="Section navigation">
    <div class="sectionnav__inner" id="sectionNavInner"></div>
  </nav>

  <span id="top"></span>

  <!-- ==== Composite sections (rendered in order from SITE_SECTIONS) ==== -->
  <main id="sections" aria-live="polite"></main>

  <!-- ==== Detail dialog (used by card sections) ==== -->
  <dialog class="dialog" id="dialog" aria-labelledby="dialogTitle">
    <div class="dialog__bar">
      <span class="dialog__spacer"></span>
      <button class="icon-btn" id="dialogClose" type="button" aria-label="Close / 關閉">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
    <div class="dialog__body" id="dialogBody"></div>
  </dialog>

  <!-- ==== Footer ==== -->
  <footer class="footer">
    <p id="footerText" data-i18n="footer">Built with lazy-data2web · static, no build step.</p>
  </footer>

  <!-- ==== Scripts (order matters: data first) ==== -->
  <script src="data/data.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/site-nav.js"></script>
  <script src="assets/ghstar.js"></script>
</body>
</html>
